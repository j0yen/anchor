name: CI

on:
  push:
    branches: [main, "autobuilder/**"]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: dtolnay/rust-toolchain@b3b07ba8b418998c39fb20f53e8b695cdcc8de8b  # 1.85.0
        with:
          components: clippy
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050cc4caf8c647cbe0264b38c5e  # v2.7.8
      - name: cargo check
        run: cargo check --workspace
      - name: cargo clippy
        run: cargo clippy --workspace -- -D warnings
      - name: cargo test
        run: cargo test --workspace --no-fail-fast
      - name: cargo deny
        uses: EmbarkStudios/cargo-deny-action@34899fc7ba81ca6268d5947c7d9c7676697ee95f  # v2.0.11
        with:
          command: check bans licenses sources
